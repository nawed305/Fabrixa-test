kind = "web"
previewPath = "/"
title = "Fabrixa Studio"
version = "1.0.0"
id = "artifacts/fabrixa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21894

[services.development]
run = "pnpm --filter @workspace/fabrixa run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fabrixa", "run", "build" ]
publicDir = "artifacts/fabrixa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21894"
BASE_PATH = "/"
